name: Refresh Databricks snapshot

# Pulls the latest tax assessment marts from Databricks and commits the
# JSON snapshot to the repo. The deploy workflow then publishes it.
#
# Required repo secrets:
#   DATABRICKS_HOST          e.g. dbc-c48d38b1-67f3.cloud.databricks.com
#   DATABRICKS_HTTP_PATH     e.g. /sql/1.0/warehouses/<warehouse-id>
#   DATABRICKS_TOKEN         personal access token
#
# Optional repo variables:
#   DATABRICKS_CATALOG       default: jason_chletsos_allegheny_tax
#   DATABRICKS_MARTS_SCHEMA  default: jason_chletsos_marts
#   SNAPSHOT_MAX_PARCELS     default: 500

on:
  schedule:
    - cron: '17 6 * * *'   # 06:17 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Databricks SQL connector
        run: pip install --quiet 'databricks-sql-connector>=3.3,<4'

      - name: Build snapshot
        working-directory: tax-assessment-app
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_CATALOG: ${{ vars.DATABRICKS_CATALOG || 'jason_chletsos_allegheny_tax' }}
          DATABRICKS_MARTS_SCHEMA: ${{ vars.DATABRICKS_MARTS_SCHEMA || 'jason_chletsos_marts' }}
          SNAPSHOT_MAX_PARCELS: ${{ vars.SNAPSHOT_MAX_PARCELS || '500' }}
        run: python scripts/build_snapshot.py

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tax-assessment-app/frontend/public/data
          if git diff --cached --quiet; then
            echo "No snapshot changes."
          else
            git commit -m "chore(data): refresh Databricks snapshot ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
          fi
