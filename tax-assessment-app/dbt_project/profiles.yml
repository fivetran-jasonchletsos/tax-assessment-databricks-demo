# ============================================================
# Owner: jason_chletsos
# Project: Allegheny County Tax Assessment Application
# dbt Profile Configuration for Databricks
# ============================================================

jason_chletsos_tax_assessment:
  target: dev
  outputs:
    dev:
      type: databricks
      host: "{{ env_var('DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
      catalog: jason_chletsos_allegheny_tax
      schema: jason_chletsos_staging  # Default target schema
      threads: 4
      
    prod:
      type: databricks
      host: "{{ env_var('DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
      catalog: jason_chletsos_allegheny_tax
      schema: jason_chletsos_staging
      threads: 8
